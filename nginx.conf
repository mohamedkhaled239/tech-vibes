# TECH VIBES — nginx config for the Vite SPA (Docker or VPS).
# On a VPS, place inside an http{} block and add your server_name + TLS.

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Compression ─────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/xml font/woff2;

    # ── Security headers ────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"            always;
    add_header X-Content-Type-Options     "nosniff"               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    # Fonts/images come from Google Fonts + remote CDNs; EmailJS is the only XHR target.
    add_header Content-Security-Policy     "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.emailjs.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # ── Fingerprinted assets: cache hard, forever ───────────────────
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }

    # ── SEO files: short cache ──────────────────────────────────────
    location = /robots.txt   { expires 1d; access_log off; }
    location = /sitemap.xml  { expires 1d; access_log off; }

    # ── SPA history fallback — every unknown path serves index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html itself must never be cached (it references hashed assets)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
